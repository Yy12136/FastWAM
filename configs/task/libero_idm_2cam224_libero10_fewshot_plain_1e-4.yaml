# @package _global_

# Plain LIBERO-10 few-shot IDM training on the annotated few-shot episode ids.
# This uses labeled-only sampling but disables factor auxiliary losses.

defaults:
  - override /data: libero_2cam
  - override /model: fastwam_idm
  - _self_

batch_size: 8
num_workers: 2
gradient_accumulation_steps: 2
fewshot_demos_per_task: 5

model:
  use_factor_aux_loss: false
  lambda_effect: 0.05
  lambda_target: 0.05
  # Used only to select the annotated episode ids for plain fine-tuning.
  # Auxiliary losses remain disabled because use_factor_aux_loss=false.
  factor_annotation_path: outputs/probe/annotations/effect_labels_first5.yaml

data:
  train:
    _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
    dataset_dirs:
      - ./data/libero_mujoco3.3.2/libero_10_no_noops_lerobot
    shape_meta:
      images:
        - key: image
          raw_shape: [3, 512, 512]
          shape: [3, 224, 224]
        - key: wrist_image
          raw_shape: [3, 512, 512]
          shape: [3, 224, 224]
      action:
        - key: default
          raw_shape: 7
          shape: 7
      state:
        - key: default
          raw_shape: 8
          shape: 8
    num_frames: 33
    global_sample_stride: 1
    action_video_freq_ratio: 4
    video_size: [224, 448]
    camera_key: null
    val_set_proportion: 0.0
    is_training_set: true
    skip_padding_as_possible: false
    concat_multi_camera: horizontal
    max_episodes_per_task: ${fewshot_demos_per_task}
    factor_aux_only_labeled_samples: true
    processor:
      _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
      shape_meta: ${data.train.shape_meta}
      num_obs_steps: ${data.train.num_frames}
      num_output_cameras: 2
      action_output_dim: 7
      proprio_output_dim: 8
      delta_action_dim_mask:
        default: [true, true, true, true, true, true, false]
      action_state_transforms: null
      use_stepwise_action_norm: false
      norm_default_mode: min/max
      norm_exception_mode: null
      action_state_merger:
        _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
      train_transforms:
        - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
        - _target_: torchvision.transforms.Resize
          size: [224, 224]
      val_transforms:
        - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
        - _target_: torchvision.transforms.Resize
          size: [224, 224]
    text_embedding_cache_dir: ./data/text_embeds_cache/libero
    context_len: 128

lr_scheduler_type: cosine
learning_rate: 1e-4
num_epochs: 10
max_steps: null
log_every: 10
save_every: 2000
eval_every: 200
weight_decay: 1e-2
resume: checkpoints/my_check/idm/no_10/step_013550.pt
